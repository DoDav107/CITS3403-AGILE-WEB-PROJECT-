<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Place requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="places-request">
  <div id="site-header"></div>
  <main>
    <section class="py-5 page-banner border-bottom">
      <div class="container">
        <p class="eyebrow mb-2">Developer review</p>
        <h1 class="fw-bold mb-3">Missing Place Requests</h1>
        <p class="text-secondary mb-0">Requests submitted by users when a restaurant or cafe is missing from BiteScout.</p>
      </div>
    </section>
    <section class="py-4">
      <div class="container">
        <div id="placeRequestsStatus" class="auth-message text-secondary mb-3"></div>
        <div class="glass-card p-4">
          <div id="placeRequestsList"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
