<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="recommendations">
  <div id="site-header"></div>
  <main>

    <section class="py-5 page-banner border-bottom">
      <div class="container">
        <p class="eyebrow mb-2">Smart discovery</p>
        <h1 class="fw-bold mb-3">Picked around your taste</h1>
        <p class="text-secondary mb-0">
          A personal mix based on your favourite cuisine, with a few fresh ideas outside your usual picks.
        </p>
      </div>
    </section>

    <section class="py-4">
      <div class="container">
        <div class="glass-card p-4 mb-4">
          <h2 id="recommendationTitle" class="h4 fw-bold mb-2">Your recommendation mix</h2>
          <p id="recommendationStatus" class="mb-0 text-secondary"></p>
        </div>

        <div class="row g-4" id="recommendationsGrid"></div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
