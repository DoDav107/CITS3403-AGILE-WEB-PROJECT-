<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Reset password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="forgot-password">
  <div id="site-header"></div>

  <main>
    <section class="py-5 auth-shell">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6 col-xl-5">
            <div class="glass-card p-4 p-md-5">
              <p class="eyebrow mb-2">Account help</p>
              <h1 class="h2 fw-bold mb-3">Reset password</h1>
              <p class="text-secondary mb-4">
                Enter your account email and choose a new password.
              </p>

              <form id="forgotPasswordForm">
                <div class="mb-3">
                  <label class="form-label" for="resetEmail">Email</label>
                  <input
                    id="resetEmail"
                    type="email"
                    class="form-control"
                    name="email"
                    placeholder="avery@example.com"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label class="form-label" for="resetPassword">New password</label>
                  <input
                    id="resetPassword"
                    type="password"
                    class="form-control"
                    name="password"
                    placeholder="Enter a new password"
                    minlength="8"
                    maxlength="72"
                    required
                  >
                </div>

                <div class="mb-3">
                  <label class="form-label" for="resetConfirmPassword">Confirm new password</label>
                  <input
                    id="resetConfirmPassword"
                    type="password"
                    class="form-control"
                    name="confirmPassword"
                    placeholder="Enter the new password again"
                    minlength="8"
                    maxlength="72"
                    required
                  >
                </div>

                <button class="btn btn-primary w-100" type="submit">Reset password</button>
              </form>

              <div id="forgotPasswordMessage" class="mt-3"></div>

              <p class="small text-secondary mt-3 mb-0">
                Remember your password? <a href="login.html">Back to log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
