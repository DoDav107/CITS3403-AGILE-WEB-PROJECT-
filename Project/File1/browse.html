<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Restaurants | Fork &amp; Frame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/layout.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </head>
  <body data-page="browse">
    <div id="layout-nav"></div>

    <main>
      <section class="page-section">
        <div class="section-header">
          <div>
            <span class="eyebrow">Browse &amp; search</span>
            <h1 class="section-title">Filter by food, area, price, and rating.</h1>
          </div>
          <div class="page-note">Interactive demo: filters and saves update on the front end.</div>
        </div>
        <div class="filter-layout">
          <aside class="filter-panel panel">
            <div class="filter-stack">
              <div>
                <label class="filter-label" for="searchInput">Search</label>
                <input id="searchInput" type="search" placeholder="Restaurant, suburb, or tag" />
              </div>
              <div>
                <label class="filter-label" for="cuisineFilter">Cuisine</label>
                <select id="cuisineFilter">
                  <option value="">All cuisines</option>
                  <option value="Modern Australian">Modern Australian</option>
                  <option value="Thai">Thai</option>
                  <option value="Japanese">Japanese</option>
                  <option value="Mediterranean">Mediterranean</option>
                  <option value="Mexican">Mexican</option>
                  <option value="Cafe">Cafe</option>
                </select>
              </div>
              <div>
                <label class="filter-label" for="priceFilter">Price range</label>
                <select id="priceFilter">
                  <option value="">All price ranges</option>
                  <option value="$">$</option>
                  <option value="$$">$$</option>
                  <option value="$$$">$$$</option>
                </select>
              </div>
              <div>
                <label class="filter-label" for="ratingFilter">Minimum rating</label>
                <select id="ratingFilter">
                  <option value="0">Any rating</option>
                  <option value="4.5">4.5 and above</option>
                  <option value="4.7">4.7 and above</option>
                  <option value="4.8">4.8 only</option>
                </select>
              </div>
            </div>
          </aside>

          <section>
            <div class="section-header mb-3">
              <div>
                <h2 class="feature-title mb-1">Current results</h2>
                <p class="section-copy mb-0" id="resultsCount">Loading places...</p>
              </div>
              <a class="btn-soft" href="profile.html">View saved list</a>
            </div>
            <div class="restaurant-grid" id="browseResults"></div>
          </section>
        </div>
      </section>
    </main>

    <div id="layout-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
