<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Fork &amp; Frame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/layout.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </head>
  <body data-page="profile">
    <div id="layout-nav"></div>

    <main>
      <section class="page-section">
        <div class="profile-card profile-hero fade-up">
          <span class="eyebrow">User profile</span>
          <h1 class="section-title mb-2" id="profileName">Avery Tan</h1>
          <p class="section-copy mb-2" id="profileMeta">Perth · avery@example.com</p>
          <p class="section-copy mb-0" id="profileTagline">
            Chasing warm bowls, sharp cocktails, and places worth recommending.
          </p>
          <div class="profile-stats mt-3">
            <div class="stat-card">
              <span class="muted-copy">Saved places</span>
              <strong id="profileFavoritesCount">0</strong>
            </div>
            <div class="stat-card">
              <span class="muted-copy">Reviews written</span>
              <strong id="profileReviewsCount">0</strong>
            </div>
            <div class="stat-card">
              <span class="muted-copy">Cuisine types</span>
              <strong id="profileCuisineCount">1</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="profile-grid">
          <section>
            <div class="section-header mb-3">
              <div>
                <span class="eyebrow">Saved shortlist</span>
                <h2 class="section-title">Favorites to revisit.</h2>
              </div>
              <a class="btn-soft" href="browse.html">Add more</a>
            </div>
            <div class="restaurant-grid" id="profileFavorites"></div>
          </section>

          <section>
            <div class="section-header mb-3">
              <div>
                <span class="eyebrow">My reviews</span>
                <h2 class="section-title">Feedback saved in the demo.</h2>
              </div>
              <a class="btn-ghost" href="review.html?id=ember-lane">Write another</a>
            </div>
            <div class="profile-list" id="profileReviews"></div>
          </section>
        </div>
      </section>
    </main>

    <div id="layout-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
