<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Sign up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="signup">
  <div id="site-header"></div>
  <main>
    
<section class="py-5 auth-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-xl-5">
        <div class="glass-card p-4 p-md-5">
          <p class="eyebrow mb-2">Create account</p>
          <h1 class="h2 fw-bold mb-3">Join BiteScout</h1>
          <p class="text-secondary mb-4">Save reviews, favourites, and preferences.</p>
          <form id="signupForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" name="name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" required>
            <div class="mb-3">
              <label class="form-label">Confirm email</label>
              <input type="email" class="form-control" name="confirmEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Favourite cuisine</label>
              <select class="form-select" name="preferredCuisine">
                <option value="">Choose one</option>
                <option>Vietnamese</option>
                <option>Italian</option>
                <option>Japanese</option>
                <option>Korean</option>
                <option>Brunch</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" minlength="6" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Create account</button>
          </form>
          <div id="signupMessage" class="mt-3"></div>
          <p class="small text-secondary mt-3 mb-0">Already have an account? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>
  </div>
</section>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
