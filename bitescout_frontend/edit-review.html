<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Edit review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="edit-review">
  <div id="site-header"></div>
  <main>
    
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5">
          <p class="eyebrow mb-2">Manage post</p>
          <h1 class="h2 fw-bold mb-3">Edit your review</h1>
          <p class="text-secondary mb-4">Update or delete a review you have written.</p>
          <form id="editReviewForm">
            <input type="hidden" name="reviewId" id="editReviewId" />
            <div class="mb-3">
              <label class="form-label">Rating</label>
              <select name="rating" id="editRating" class="form-select" required>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" name="title" id="editTitle" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Review</label>
              <textarea name="content" id="editContent" class="form-control" rows="5" required></textarea>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-primary" type="submit">Save changes</button>
              <button id="deleteReviewBtn" class="btn btn-outline-danger" type="button">Delete review</button>
            </div>
          </form>
          <div id="editReviewMessage" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>
</section>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
