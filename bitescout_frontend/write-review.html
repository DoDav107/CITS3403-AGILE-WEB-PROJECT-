<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Write review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="write-review">
  <div id="site-header"></div>
  <main>
    
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5">
          <p class="eyebrow mb-2">Share your experience</p>
          <h1 class="h2 fw-bold mb-3">Write a review</h1>
          <p class="text-secondary mb-4">Choose a restaurant and optionally a dish, then post your rating and feedback.</p>
          <form id="writeReviewForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Restaurant</label>
                <select name="restaurantId" id="reviewRestaurantSelect" class="form-select" required></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Dish</label>
                <select name="dishId" id="reviewDishSelect" class="form-select">
                  <option value="">Restaurant review only</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Rating</label>
                <select name="rating" class="form-select" required>
                  <option value="">Choose rating</option>
                  <option value="5">5</option>
                  <option value="4">4</option>
                  <option value="3">3</option>
                  <option value="2">2</option>
                  <option value="1">1</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Amazing flavour and quick service" required>
              </div>
              <div class="col-12">
                <label class="form-label">Your review</label>
                <textarea name="content" class="form-control" rows="5" required></textarea>
              </div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">Post review</button>
          </form>
          <div id="writeReviewMessage" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>
</section>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
