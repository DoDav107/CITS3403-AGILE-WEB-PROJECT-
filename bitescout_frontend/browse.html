<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Browse restaurants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="browse">
  <div id="site-header"></div>
  <main>
    
<section class="py-5 page-banner border-bottom">
  <div class="container">
    <p class="eyebrow mb-2">Browse and search</p>
    <h1 class="fw-bold mb-3">Restaurants near you</h1>
    <p class="text-secondary mb-0">Allow location access to browse nearby places from Google, then filter by type, tags, and rating.</p>
  </div>
</section>
<section class="py-4">
  <div class="container">
    <div class="glass-card p-4 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-lg-3">
          <label class="form-label">Search</label>
          <input id="searchInput" class="form-control" placeholder="e.g. ramen, bakery, coffee" />
        </div>
        <div class="col-md-4 col-lg-3">
          <label class="form-label">Type</label>
          <select id="placeTypeFilter" class="form-select">
            <option value="">Any</option>
          </select>
        </div>
        <div class="col-md-4 col-lg-3">
          <label class="form-label">Tag</label>
          <select id="tagFilter" class="form-select">
            <option value="">Any</option>
          </select>
        </div>
        <div class="col-md-4 col-lg-2">
          <label class="form-label">Stars</label>
          <select id="ratingFilter" class="form-select">
            <option value="0">Any</option>
            <option value="3">★★★☆☆ and up</option>
            <option value="4">★★★★☆ and up</option>
            <option value="5">★★★★★ only</option>
          </select>
        </div>
        <div class="col-lg-1 d-grid">
          <button id="retryLocationBrowse" class="btn btn-outline-dark">Retry</button>
        </div>
      </div>
      <div id="browseLocationMessage" class="small text-secondary mt-3"></div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h4 fw-bold mb-0">Results</h2>
      <span id="resultsCount" class="text-secondary"></span>
    </div>
    <div id="browseResults" class="row g-4"></div>
  </div>
</section>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
