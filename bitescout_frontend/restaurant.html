<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiteScout | Restaurant details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="restaurant">
  <div id="site-header"></div>
  <main>
    
<section class="py-5 page-banner border-bottom">
  <div class="container" id="restaurantHero"></div>
</section>
<section class="py-4">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="glass-card p-4 mb-4" id="restaurantAbout"></div>
        <div class="glass-card p-4 mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 fw-bold mb-0">Popular dishes</h2>
            <a href="write-review.html" class="btn btn-sm btn-primary">Write review</a>
          </div>
          <div id="restaurantDishes" class="row g-3"></div>
        </div>
        <div class="glass-card p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 fw-bold mb-0">Community reviews</h2>
            <a href="write-review.html" class="btn btn-sm btn-outline-dark">Add review</a>
          </div>
          <div id="restaurantReviews"></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="glass-card p-4 mb-4" id="restaurantSidebar"></div>
        <div class="glass-card p-4">
          <h3 class="h5 fw-bold">Quick actions</h3>
          <div class="d-grid gap-2">
            <button id="saveRestaurantBtn" class="btn btn-primary">Save to favourites</button>
            <a class="btn btn-outline-dark" href="browse.html">Back to browse</a>
          </div>
          <div id="saveRestaurantMessage" class="small mt-3"></div>
        </div>
      </div>
    </div>
  </div>
</section>

  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
